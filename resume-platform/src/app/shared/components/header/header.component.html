<header class="sticky top-0 z-50 bg-white border-b border-gh-border shadow-sm">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo/Name -->
      <div class="flex-shrink-0">
        <button
          type="button"
          (click)="scrollToSection('home')"
          class="text-xl font-bold text-gh-dark hover:text-gh-blue focus:outline-none focus:ring-2 focus:ring-gh-blue focus:ring-offset-2 transition-colors"
        >
          Tushar Sahu
        </button>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex md:space-x-8">
        <button
          type="button"
          *ngFor="let link of navLinks"
          (click)="scrollToSection(link.id)"
          class="text-gh-light hover:text-gh-blue focus:outline-none focus:ring-2 focus:ring-gh-blue focus:ring-offset-2 px-3 py-2 text-sm font-medium transition-colors"
        >
          {{ link.label }}
        </button>
      </div>

      <!-- Mobile menu button -->
      <div class="md:hidden">
        <button
          type="button"
          (click)="toggleMobileMenu()"
          class="text-gh-dark hover:text-gh-blue focus:outline-none focus:ring-2 focus:ring-gh-blue focus:ring-offset-2 p-2"
          aria-label="Toggle menu"
          [attr.aria-expanded]="mobileMenuOpen"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              *ngIf="!mobileMenuOpen"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
            <path
              *ngIf="mobileMenuOpen"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Navigation -->
    <div
      *ngIf="mobileMenuOpen"
      class="md:hidden border-t border-gh-border"
    >
      <div class="py-2 space-y-1">
        <button
          type="button"
          *ngFor="let link of navLinks"
          (click)="scrollToSection(link.id)"
          class="block w-full text-left px-4 py-2 text-base font-medium text-gh-light hover:text-gh-blue hover:bg-gh-bg focus:outline-none focus:ring-2 focus:ring-gh-blue focus:ring-offset-2 transition-colors"
        >
          {{ link.label }}
        </button>
      </div>
    </div>
  </nav>
</header>
